<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konsultasi | Akbar Sehati</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-bg-pattern">

    <div class="chat-main-container">
        
        <header class="chat-header">
            <div class="container-fluid d-flex align-items-center justify-content-between px-3">
                <div class="d-flex align-items-center">
                    <a href="index.html" class="text-white me-3 text-decoration-none" title="Kembali ke Beranda">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M19 12H5M12 19l-7-7 7-7"></path>
                        </svg>
                    </a>
                    
                    <div class="avatar-header">AS</div>
                    <div class="ms-3">
                        <h6 class="mb-0 fw-bold">Konsultasi Akbar Sehati</h6>
                        <small class="status-online">Online</small>
                    </div>
                </div>
            </div>
        </header>

        <main id="chat-window" class="chat-messages-area">
            </main>

        <footer class="chat-input-section">
            <div class="container-fluid">
                <div class="input-group-adaptive">
                    <input type="text" id="name-input" class="chat-input-pill" placeholder="Nama">
                    
                    <input type="text" id="message-input" class="chat-input-pill flex-grow-1" placeholder="Ketik pesan medis...">
                    
                    <button id="btn-send" class="btn-send-circle">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                            <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
